name: Delete Nightly Build

on:
  push:
    branches:
      - mods

jobs:
  delete:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false
    - name: Delete Nightly Build
      if: github.ref_type != 'tag'
      run: |
        gh release delete nightly --cleanup-tag --yes
      
